<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПГДС Строй - Сайт в разработке</title>
    <meta name="description" content="ООО ПГДС Строй - сайт находится в разработке">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            animation: fadeIn 0.6s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon {
            font-size: 80px;
            margin-bottom: 30px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        h1 {
            font-size: 2.5rem;
            color: #333;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 30px;
        }

        .info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-top: 30px;
        }

        .info p {
            color: #555;
            line-height: 1.8;
            margin-bottom: 10px;
        }

        .info p:last-child {
            margin-bottom: 0;
        }

        .contact {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #777;
        }

        .logo {
            font-weight: 700;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🚧</div>
        <h1>ПГДС Строй</h1>
        <div class="subtitle">Сайт находится в разработке</div>

        <div class="info">
            <p class="logo">ООО «ПГДС»</p>
            <p>Российская инжиниринговая компания</p>
            <p>Специализируемся на проектировании и строительстве сетей газораспределения и газопотребления</p>
        </div>

        <div class="contact">
            <p>Скоро запустим новый сайт</p>
        </div>
    </div>
</body>
</html>
